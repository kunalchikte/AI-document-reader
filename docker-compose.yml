services:
  backend:
    build: ./backend
    container_name: ai-doc-reader-backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: ai-doc-reader-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
